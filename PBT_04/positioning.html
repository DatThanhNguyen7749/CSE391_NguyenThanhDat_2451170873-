<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Positioning Playground</title>
  <link rel="stylesheet" href="positioning.css">
</head>

<body>
  <header class="header">

    <div class="logo">
      ShopDatDepZai123
    </div>

    <nav class="navbar">
      <a href="#">Trang chủ</a>
      <a href="#">Sản phẩm</a>
      <a href="#">Liên hệ</a>
    </nav>

  </header>

  <div class="container">
    <aside class="sidebar">
      <h3>Danh mục</h3>
      <ul>
        <li>Điện thoại</li>
        <li>Laptop</li>
        <li>Tai nghe</li>
      </ul>
    </aside>

    <main class="content">
      <h2>Sản phẩm nổi bật</h2>
      <div class="products">
        <div class="card">
          <div class="hot">
            HOT
          </div>
          <div class="image">
            Iphone
          </div>
          <h3>iPhone 16</h3>
          <p>29.990.000đ</p>
        </div>

        <div class="card">
          <div class="hot">
            HOT
          </div>
          <div class="image">
            Laptop
          </div>
          <h3>Macbook Air</h3>
          <p>27.490.000đ</p>
        </div>

        <div class="card">
          <div class="image">
            Headphone
          </div>
          <h3>AirPods</h3>
          <p>6.290.000đ</p>
        </div>
      </div>
    </main>

  </div>
  <button class="top-btn">
    ↑
  </button>
</body>

</html>
