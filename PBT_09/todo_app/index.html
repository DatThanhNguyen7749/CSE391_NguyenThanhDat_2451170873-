<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>📝 Todo App</h1>


        <form id="todoForm">
            <input type="text" id="todoInput" placeholder="Nhập công việc...">
            <button type="submit">Thêm</button>
        </form>


        <div class="filters">
            <button class="filter-btn active" data-filter="all">Tất cả</button>
            <button class="filter-btn" data-filter="active">Chưa xong</button>
            <button class="filter-btn" data-filter="completed">Đã xong</button>
        </div>


        <ul id="todoList"></ul>


        <div class="footer">
            <span id="itemCount">0 việc còn lại</span>
            <button id="clearCompleted">Xóa đã hoàn thành</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
